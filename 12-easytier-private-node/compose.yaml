services:
  easytier:
    image: easytier/easytier:latest
    container_name: easytier
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /etc/machine-id:/etc/machine-id:ro
      - ./config/easytier.toml:/config/easytier.toml:ro
      - ./data:/data
      - ./log:/var/log/easytier
    command: -c /config/easytier.toml

  easytier-web:
    image: easytier/easytier:latest
    container_name: easytier-web
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data/web:/data
    command: >
      easytier-web-embed
      --api-server-port ${WEB_PORT:-11211}
      --api-host http://127.0.0.1:${WEB_PORT:-11211}
      --config-server-port ${CONFIG_SERVER_PORT:-22020}
      --config-server-protocol udp
    depends_on:
      - easytier

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: easytier-cloudflared
    restart: unless-stopped
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - easytier-web

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: easytier-fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - F2B_LOG_LEVEL=INFO
    volumes:
      - ./fail2ban/filter.d:/data/filter.d:ro
      - ./fail2ban/jail.d:/data/jail.d:ro
      - ./log:/var/log/easytier:ro
    depends_on:
      - easytier
